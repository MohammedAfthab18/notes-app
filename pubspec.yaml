name: noteshub
description: "NotesHub: an offline Apple Notes inspired study-notes app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.3
  go_router: ^17.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  archive: ^3.6.1
  firebase_core: ^3.15.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.0
  firebase_analytics: ^11.4.0
  google_sign_in: ^6.3.0
  path_provider: ^2.1.5
  file_picker: ^10.3.7
  docx_to_text: ^1.0.1
  flutter_markdown: ^0.7.7+1
  flutter_highlight: ^0.7.0
  google_fonts: ^6.3.2
  intl: ^0.20.2
  url_launcher: ^6.3.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
